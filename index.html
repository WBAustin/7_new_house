<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jersey City 公寓对比 - 57/43 分摊</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif; background: #f5f5f5; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        header { background: white; padding: 30px 20px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { font-size: 32px; margin-bottom: 8px; color: #2c3e50; }
        .subtitle { color: #7f8c8d; font-size: 16px; }
        .controls { background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 12px; flex-wrap: wrap; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button, select, input { padding: 10px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 14px; cursor: pointer; background: white; transition: all 0.3s ease; }
        button:hover { background: #f0f0f0; border-color: #bbb; }
        button.primary { background: #3498db; color: white; border-color: #3498db; }
        button.primary:hover { background: #2980b9; }
        .sort-label { margin-left: auto; color: #7f8c8d; font-size: 13px; font-weight: 500; }
        .apartments-grid { display: grid; gap: 16px; }
        .apartment-card { background: white; border: 1px solid #e0e0e0; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: box-shadow 0.3s ease; }
        .apartment-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .card-title { display: flex; gap: 8px; align-items: center; }
        .badge { background: #3498db; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; }
        .card-title h3 { font-size: 16px; color: #2c3e50; }
        .card-location { color: #7f8c8d; font-size: 13px; margin-top: 4px; }
        .delete-btn { background: transparent; border: none; font-size: 20px; cursor: pointer; padding: 0; color: #e74c3c; }
        .delete-btn:hover { transform: scale(1.2); }

        /* Floor plan */
        .fp-wrap { margin-bottom: 14px; border: 1px solid #e8e8e8; border-radius: 8px; overflow: hidden; background: #fafafa; }
        .fp-toggle { width: 100%; background: #f0f4f8; border: none; border-bottom: 1px solid #e8e8e8; padding: 8px 14px; text-align: left; cursor: pointer; font-size: 13px; color: #555; display: flex; align-items: center; justify-content: space-between; border-radius: 0; }
        .fp-toggle:hover { background: #e8edf2; }
        .fp-toggle .arrow { transition: transform 0.25s ease; font-size: 11px; }
        .fp-toggle.open .arrow { transform: rotate(180deg); }
        .fp-body { display: none; padding: 0; }
        .fp-body.open { display: block; }
        .fp-body img { width: 100%; max-height: 320px; object-fit: contain; display: block; }

        /* Amenities */
        .amenities-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
        .amenity-badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; position: relative; cursor: default; }
        .amenity-badge.type { background: #e8f4fd; color: #2980b9; }
        .amenity-badge.yes { background: #e9f7ef; color: #27ae60; }
        .amenity-badge.no { background: #fdedec; color: #e74c3c; }
        .amenity-badge .tip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #2c3e50; color: white; padding: 5px 9px; border-radius: 5px; font-size: 11px; white-space: nowrap; z-index: 100; pointer-events: none; }
        .amenity-badge .tip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: #2c3e50; }
        .amenity-badge:hover .tip { display: block; }

        .price-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .price-box { background: #f9f9f9; padding: 12px; border-radius: 8px; border: 1px solid #e0e0e0; }
        .price-box.highlight { background: #e3f2fd; border: 2px solid #3498db; }
        .price-label { font-size: 11px; color: #7f8c8d; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
        .price-value { font-size: 18px; font-weight: 600; color: #2c3e50; }
        .price-box.highlight .price-value { color: #3498db; }
        .specs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 12px; margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid #e0e0e0; }
        .spec-box { background: #f9f9f9; padding: 10px; border-radius: 6px; font-size: 12px; }
        .spec-label { color: #7f8c8d; font-size: 10px; text-transform: uppercase; font-weight: 600; margin-bottom: 2px; }
        .spec-value { color: #2c3e50; font-weight: 500; }
        .features { font-size: 13px; color: #555; margin-bottom: 12px; }
        .features strong { color: #2c3e50; }
        .notes { background: #f0f7ff; padding: 10px 12px; border-radius: 6px; border-left: 3px solid #3498db; font-size: 13px; margin-bottom: 12px; color: #2c3e50; }
        .view-link { display: inline-flex; align-items: center; gap: 4px; color: #3498db; text-decoration: none; font-size: 13px; font-weight: 500; }
        .view-link:hover { text-decoration: underline; }

        /* Add form */
        .add-form { background: white; padding: 24px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; }
        .add-form h3 { margin-bottom: 16px; color: #2c3e50; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 4px; }
        .form-group label { font-size: 12px; font-weight: 600; color: #7f8c8d; text-transform: uppercase; }
        .form-group input, .form-group select { padding: 8px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; background: white; }
        .form-actions { display: flex; gap: 12px; }
        .fp-preview-text { font-size: 13px; color: #27ae60; margin-top: 4px; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>🏠 Jersey City 公寓对比</h1>
        <div class="subtitle">57% / 43% 分摊 · 8套房源 · 含户型图与设施（鼠标悬停可看设施详情）</div>
    </header>

    <div class="controls">
        <button class="primary" onclick="toggleForm()">+ 添加房源</button>
        <button onclick="resetData()">🔄 重置数据</button>
        <span class="sort-label">排序：</span>
        <select onchange="updateSort(this.value)">
            <option value="yourPayment">按你的分摊（低→高）</option>
            <option value="totalRent">按总租金（低→高）</option>
            <option value="sqft">按面积（大→小）</option>
        </select>
    </div>

    <div class="add-form" id="addForm">
        <h3>添加新房源</h3>
        <div class="form-grid">
            <div class="form-group"><label>房源名称 *</label><input id="fName" placeholder="如：XX公寓 - Unit 101"></div>
            <div class="form-group"><label>楼盘名称</label><input id="fBuilding" placeholder="楼盘名"></div>
            <div class="form-group"><label>地址</label><input id="fLocation" placeholder="完整地址"></div>
            <div class="form-group"><label>链接</label><input id="fUrl" placeholder="https://..."></div>
            <div class="form-group"><label>月租金 ($) *</label><input id="fRent" type="number" placeholder="3500"></div>
            <div class="form-group"><label>可入住日期</label><input id="fDate" placeholder="Available Now"></div>
            <div class="form-group"><label>面积 (sqft)</label><input id="fSqft" placeholder="700"></div>
            <div class="form-group"><label>主卧尺寸</label><input id="fBed" placeholder="12' x 10'"></div>
            <div class="form-group"><label>客厅尺寸</label><input id="fLiving" placeholder="15' x 12'"></div>
            <div class="form-group"><label>房子类型</label>
                <select id="fType"><option>公寓</option><option>Townhouse</option><option>其他</option></select>
            </div>
            <div class="form-group"><label>健身房</label>
                <select id="fGym"><option value="true">有</option><option value="false">无</option></select>
            </div>
            <div class="form-group"><label>游泳池</label>
                <select id="fPool"><option value="true">有</option><option value="false">无</option></select>
            </div>
            <div class="form-group"><label>公共互动区</label>
                <select id="fCommon"><option value="true">有</option><option value="false">无</option></select>
            </div>
            <div class="form-group"><label>特性描述</label><input id="fFeatures" placeholder="W/D in unit..."></div>
            <div class="form-group"><label>备注</label><input id="fNotes" placeholder="个人评价..."></div>
            <div class="form-group"><label>户型图</label>
                <input type="file" id="fFP" accept="image/*">
                <div class="fp-preview-text" id="fpText"></div>
            </div>
        </div>
        <div class="form-actions">
            <button class="primary" onclick="addApartment()">✓ 添加</button>
            <button onclick="toggleForm()">取消</button>
        </div>
    </div>

    <div class="apartments-grid" id="aptContainer"></div>
</div>

// 用户新增的户型图（新增房源时用）
const USER_FP = {};

let apartments = JSON.parse(localStorage.getItem('apts_v4') || 'null') || INITIAL_APTS;
let sortBy = 'yourPayment';

function saveToLS() {
    // 只存不含户型图的数据
    localStorage.setItem('apts_v4', JSON.stringify(apartments));
}

function resetData() {
    if (confirm('重置所有数据到初始状态？')) {
        apartments = JSON.parse(JSON.stringify(INITIAL_APTS));
        saveToLS();
        render();
    }
}

function toggleForm() {
    const f = document.getElementById('addForm');
    f.style.display = (f.style.display === 'none' || !f.style.display) ? 'block' : 'none';
    if (f.style.display === 'block') document.getElementById('fName').focus();
}

function addApartment() {
    const name = document.getElementById('fName').value.trim();
    const rent = parseFloat(document.getElementById('fRent').value);
    if (!name || isNaN(rent)) { alert('请填写房源名称和月租金'); return; }

    const newId = Date.now();
    const apt = {
        id: newId, name,
        building: document.getElementById('fBuilding').value.trim(),
        location: document.getElementById('fLocation').value.trim(),
        url: document.getElementById('fUrl').value.trim(),
        sqft: document.getElementById('fSqft').value.trim(),
        totalRent: rent,
        availableDate: document.getElementById('fDate').value.trim(),
        masterBedroom: document.getElementById('fBed').value.trim(),
        livingRoom: document.getElementById('fLiving').value.trim(),
        features: document.getElementById('fFeatures').value.trim(),
        notes: document.getElementById('fNotes').value.trim(),
        type: document.getElementById('fType').value,
        gym: document.getElementById('fGym').value === 'true',
        gymNote: '',
        pool: document.getElementById('fPool').value === 'true',
        poolNote: '',
        commonArea: document.getElementById('fCommon').value === 'true'
    };

    const file = document.getElementById('fFP').files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = e => {
            USER_FP[newId] = e.target.result;
            apartments.push(apt);
            saveToLS();
            render();
            toggleForm();
            clearForm(newId);
        };
        reader.readAsDataURL(file);
    } else {
        apartments.push(apt);
        saveToLS();
        render();
        toggleForm();
        clearForm(newId);
    }
}

function clearForm() {
    ['fName','fBuilding','fLocation','fUrl','fRent','fDate','fSqft','fBed','fLiving','fFeatures','fNotes']
        .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
    document.getElementById('fFP').value = '';
    document.getElementById('fpText').textContent = '';
}

function deleteApartment(id) {
    if (confirm('确认删除？')) {
        apartments = apartments.filter(a => a.id !== id);
        delete USER_FP[id];
        saveToLS();
        render();
    }
}

function toggleFP(id) {
    const btn = document.getElementById('fp-btn-' + id);
    const body = document.getElementById('fp-body-' + id);
    if (!btn || !body) return;
    const isOpen = body.classList.contains('open');
    if (isOpen) {
        body.classList.remove('open');
        btn.classList.remove('open');
    } else {
        body.classList.add('open');
        btn.classList.add('open');
    }
}

function updateSort(v) { sortBy = v; render(); }

function makeBadge(icon, label, isYes, note) {
    const cls = isYes ? 'yes' : 'no';
    const mark = isYes ? '✓' : '✗';
    const tip = note ? `<span class="tip">${note}</span>` : '';
    return `<span class="amenity-badge ${cls}">${icon} ${label}${mark}${tip}</span>`;
}

function render() {
    const sorted = [...apartments].sort((a, b) => {
        if (sortBy === 'yourPayment') return Math.round(a.totalRent * 0.43) - Math.round(b.totalRent * 0.43);
        if (sortBy === 'sqft') return (parseFloat(b.sqft)||0) - (parseFloat(a.sqft)||0);
        return a.totalRent - b.totalRent;
    });

    const c = document.getElementById('aptContainer');
    if (!sorted.length) { c.innerHTML = '<div style="text-align:center;padding:60px;color:#7f8c8d"><h3>还没有房源</h3></div>'; return; }

    c.innerHTML = sorted.map((apt, idx) => {
        const cp = Math.round(apt.totalRent * 0.57);
        const yp = Math.round(apt.totalRent * 0.43);

        // 获取户型图：优先内嵌的 FLOOR_PLANS，其次用户新增的 USER_FP
        const fpSrc = FLOOR_PLANS[apt.id] || USER_FP[apt.id] || null;
        const fpHtml = fpSrc ? `
            <div class="fp-wrap">
                <button class="fp-toggle" id="fp-btn-${apt.id}" onclick="toggleFP(${apt.id})">
                    <span>🗺️ 户型图</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="fp-body" id="fp-body-${apt.id}">
                    <img src="${fpSrc}" alt="户型图 ${apt.name}">
                </div>
            </div>` : '';

        const typeBadge = apt.type ? `<span class="amenity-badge type">🏠 ${apt.type}</span>` : '';
        const gymBadge = apt.gym !== undefined ? makeBadge('🏋️', '健身房', apt.gym, apt.gymNote||'') : '';
        const poolBadge = apt.pool !== undefined ? makeBadge('🏊', '泳池', apt.pool, apt.poolNote||'') : '';
        const commonBadge = apt.commonArea !== undefined ? makeBadge('🛋️', '公共区', apt.commonArea, '') : '';

        return `<div class="apartment-card">
            <div class="card-header">
                <div class="card-title">
                    <span class="badge">#${idx+1}</span>
                    <div>
                        <h3>${apt.name}</h3>
                        <div class="card-location">${apt.location}</div>
                    </div>
                </div>
                <button class="delete-btn" onclick="deleteApartment(${apt.id})" title="删除">🗑</button>
            </div>
            ${fpHtml}
            <div class="amenities-row">${typeBadge}${gymBadge}${poolBadge}${commonBadge}</div>
            <div class="price-grid">
                <div class="price-box highlight">
                    <div class="price-label">厅卧(43%)</div>
                    <div class="price-value">$${yp.toLocaleString()}</div>
                </div>
                <div class="price-box">
                    <div class="price-label">主卧(57%)</div>
                    <div class="price-value">$${cp.toLocaleString()}</div>
                </div>
                <div class="price-box">
                    <div class="price-label">总租金</div>
                    <div class="price-value">$${apt.totalRent.toLocaleString()}</div>
                </div>
                <div class="price-box">
                    <div class="price-label">可入住</div>
                    <div class="price-value">${apt.availableDate}</div>
                </div>
            </div>
            <div class="specs-grid">
                <div class="spec-box"><div class="spec-label">面积</div><div class="spec-value">${apt.sqft} sqft</div></div>
                <div class="spec-box"><div class="spec-label">主卧</div><div class="spec-value">${apt.masterBedroom}</div></div>
                <div class="spec-box"><div class="spec-label">客厅</div><div class="spec-value">${apt.livingRoom}</div></div>
            </div>
            <div class="features"><strong>特性：</strong> ${apt.features}</div>
            ${apt.notes ? `<div class="notes">${apt.notes}</div>` : ''}
            <a href="${apt.url}" target="_blank" class="view-link">查看房源 ↗</a>
        </div>`;
    }).join('');
}

render();

document.getElementById('fFP').addEventListener('change', function(e) {
    document.getElementById('fpText').textContent = e.target.files[0] ? '✓ ' + e.target.files[0].name : '';
});
</script>
</body>
</html>
